<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store - Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">TECH <span style="color: #237fea;">STORE</span></a>
            <button class="btn btn-outline-light position-relative">
                Carrito
                <span id="badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </button>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-9">
                <div class="row g-4">
                    
                    <div class="col-md-6 col-xl-4">
                        <div class="product-card">
                            <div class="circle" style="background: #237fea;"></div>
                            <img src="img/Board.png" alt="Board" class="product-img">
                            <div class="contentBx">
                                <h2>Motherboard</h2>
                                <div class="price-tag">$850.000</div>
                                <button class="btn-agregar" data-nombre="Motherboard" data-precio="850000">Agregar</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 col-xl-4">
                        <div class="product-card">
                            <div class="circle" style="background: #ff2020;"></div>
                            <img src="img/grafica.png" alt="GPU" class="product-img">
                            <div class="contentBx">
                                <h2>Tarjeta Gráfica</h2>
                                <div class="price-tag">$2.500.000</div>
                                <button class="btn-agregar" data-nombre="Tarjeta Gráfica" data-precio="2500000">Agregar</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 col-xl-4">
                        <div class="product-card">
                            <div class="circle" style="background: #00d2ff;"></div>
                            <img src="img/procesador.png" alt="CPU" class="product-img">
                            <div class="contentBx">
                                <h2>Procesador</h2>
                                <div class="price-tag">$1.200.000</div>
                                <button class="btn-agregar" data-nombre="Procesador" data-precio="1200000">Agregar</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 col-xl-4">
                        <div class="product-card">
                            <div class="circle" style="background: #ffcf00;"></div>
                            <img src="img/ram.png" alt="RAM" class="product-img">
                            <div class="contentBx">
                                <h2>Memoria RAM</h2>
                                <div class="price-tag">$450.000</div>
                                <button class="btn-agregar" data-nombre="Memoria RAM" data-precio="450000">Agregar</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="col-lg-3 mt-5 mt-lg-0">
                <div class="carrito-panel shadow-lg p-3 rounded">
                    <h4 class="text-dark border-bottom pb-2">Tu Carrito</h4>
                    <ul id="lista-carrito" class="list-group list-group-flush mb-3">
                        <p id="msg-vacio" class="text-center text-muted my-3">Tu carrito está vacío</p>
                    </ul>
                    <div class="border-top pt-3 text-dark">
                        <p class="h5 d-flex justify-content-between">Total: <span id="total">$0</span></p>
                        <button id="btn-vaciar" class="btn btn-danger w-100 mt-2">Vaciar Carrito</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
