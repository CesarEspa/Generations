<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="app-container">
        <h1>Task Manager 📝</h1>
        
        <div class="input-section">
            <div class="form-group">
                <input type="text" id="tareaInput" placeholder="¿Qué tienes pendiente?">
                <select id="categoriaSelect" onchange="mostrarOtra()">
                    <option value="💼 Trabajo">Trabajo</option>
                    <option value="🏠 Personal">Personal</option>
                    <option value="🚨 Urgente">Urgente</option>
                    <option value="📚 Estudio">Estudio</option>
                    <option value="Otra">Otra...</option>
                </select>
            </div>
            
            <input type="text" id="otraInput" placeholder="Nombre de categoría" style="display: none;">
            
            <button id="btnAgregar">Agregar Tarea</button>
            <span id="errorMsg" class="error-text" style="display: none;">El campo no puede estar vacío</span>
        </div>

        <div class="stats">
            <p><span id="hechas">0</span> de <span id="totales">0</span> tareas completadas</p>
        </div>

        <ul id="listaTareas"></ul>

        <button onclick="limpiarCompletadas()" class="btn-clear">Limpiar completadas</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
