<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Centrada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Necesitamos que el body ocupe todo el alto de la pantalla para centrar verticalmente */
        body {
            min-height: 100vh;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center bg-light">

    <div class="card text-center shadow bg-light mb-3" style="width: 18rem;">
        <img class="card-img-top" src="img/image-ada031fb-a8ef-4296-b41c-496fb86826d2.png" alt="Cesar España">
        <div class="card-body">
            <h5 class="card-title fw-bold">Cesar España Salguero</h5>
            <h6 class="card-subtitle mb-2 text-muted">Data Science</h6>
            <p class="card-text text-muted small px-2">
                Ingeniero de Sistemas y estudiante de Maestría en Inteligencia Artificial.
                Especialista en Datos y Desarrollo Full Stack, enfocado en resolver problemas
                complejos con soluciones tecnológicas eficaces.
            </p>

            <div class="mb-3">
                <a href="https://www.linkedin.com/..." class="btn btn-primary btn-sm">LinkedIn</a>
                <a href="https://github.com/..." class="btn btn-dark btn-sm">GitHub</a>
            </div>

            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=cesarespana.dev@gmail.com" target="_blank"
                class="text-decoration-none">cesarespana.dev@gmail.com</a>
        </div>
    </div>

</body>

</html>
